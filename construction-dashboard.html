<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <meta http-equiv="refresh" content="3600">
  <title>Active Construction Projects — Mission Constructors</title>
  <link rel="stylesheet" href="style.css">
  <script src="data/construction-data.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #0d0d0d;
      color: #E6E6E6;
      font-family: 'Red Hat Text', sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    .dashboard {
      width: 1920px;
      height: 1080px;
      display: flex;
      flex-direction: column;
      padding: 28px 40px 20px;
    }

    /* ---- HEADER ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .header-logo svg {
      width: 56px;
      height: 48px;
    }

    .header-text {
      flex: 1;
    }

    .header-title {
      font-family: 'Space Mono', monospace;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #E6E6E6;
    }

    .header-subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #F49466;
      margin-top: 2px;
    }

    .header-date {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
      text-align: right;
      white-space: nowrap;
    }

    /* ---- CARDS ROW ---- */
    .cards {
      display: flex;
      gap: 24px;
      flex: 1;
      min-height: 0;
    }

    .card {
      flex: 1;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      position: relative;
      border: 1px solid #2a2a2a;
    }

    .card-header {
      margin-bottom: 20px;
    }

    .card-name {
      font-family: 'Space Mono', monospace;
      font-size: 34px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
    }

    .card-location {
      font-size: 16px;
      color: #999;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* Status badge */
    .badge {
      position: absolute;
      top: 24px;
      right: 24px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 6px;
    }

    .badge--yellow {
      background: rgba(250, 204, 21, 0.15);
      color: #facc15;
      border: 1px solid rgba(250, 204, 21, 0.3);
    }

    .badge--blue {
      background: rgba(96, 165, 250, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.3);
    }

    /* Progress section */
    .progress-section {
      margin-bottom: 20px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .progress-label-text {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .progress-pct {
      font-family: 'Space Mono', monospace;
      font-size: 36px;
      font-weight: 700;
      color: #F49466;
    }

    .progress-bar-track {
      width: 100%;
      height: 14px;
      background: #2a2a2a;
      border-radius: 7px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 7px;
      background: linear-gradient(90deg, #A0503C, #F49466);
      transition: width 0.6s ease;
    }

    /* Data rows */
    .card-data {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 4px;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2px;
    }

    .data-row-label {
      font-size: 14px;
      color: #777;
      letter-spacing: 0.3px;
    }

    .data-row-value {
      font-size: 16px;
      font-weight: 600;
      color: #E6E6E6;
      text-align: right;
    }

    .data-divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 2px 0;
    }

    /* Draw status badge inline */
    .draw-status {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .draw-status--draft { background: rgba(250,204,21,0.15); color: #facc15; }
    .draw-status--submitted { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .draw-status--funded { background: rgba(74,222,128,0.15); color: #4ade80; }
    .draw-status--overdue { background: rgba(248,113,113,0.15); color: #f87171; }

    /* Milestone */
    .milestone {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid #2a2a2a;
    }

    .milestone-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .milestone-text {
      font-size: 16px;
      color: #F49466;
      font-weight: 500;
    }

    /* ---- SUMMARY BAR ---- */
    .summary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px 40px;
      margin-top: 20px;
      flex-shrink: 0;
      border: 1px solid #2a2a2a;
    }

    .summary-item {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .summary-value {
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: #F49466;
    }

    .summary-label {
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .summary-divider {
      width: 1px;
      height: 32px;
      background: #333;
    }

    /* ---- FOOTER ---- */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      flex-shrink: 0;
    }

    .footer-left {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #555;
    }

    .footer-right {
      font-size: 13px;
      color: #555;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="dashboard">

    <!-- HEADER -->
    <div class="header">
      <div class="header-logo">
        <svg viewBox="0 0 510 435"><path d="M310,181.5V110L110,180V325H400V150ZM120,315V187.09l180-63V185L200,220v95Zm90,0V227.09l90-31.5V315Zm180,0H310V192.09l80-28Z" fill="white"/></svg>
      </div>
      <div class="header-text">
        <div class="header-title">Active Construction</div>
        <div class="header-subtitle">Mission Constructors</div>
      </div>
      <div class="header-date" id="header-date"></div>
    </div>

    <!-- PROJECT CARDS -->
    <div class="cards" id="cards-container"></div>

    <!-- SUMMARY BAR -->
    <div class="summary">
      <div class="summary-item">
        <span class="summary-value" id="sum-units">—</span>
        <span class="summary-label">Units Under Construction</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <span class="summary-value" id="sum-value">—</span>
        <span class="summary-label">Total Construction Value</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <span class="summary-value" id="sum-projects">—</span>
        <span class="summary-label">Active Projects</span>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-left">Ridgehouse Companies</div>
      <div class="footer-right" id="footer-date"></div>
    </div>

  </div>

  <script>
    (function() {
      var d = window.CONSTRUCTION_DATA;
      if (!d) return;

      // Format date
      var date = new Date(d.report_date + 'T12:00:00');
      var dateStr = date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      document.getElementById('header-date').textContent = dateStr;
      document.getElementById('footer-date').textContent = 'Data as of ' + dateStr;

      // Summary bar
      var ps = d.portfolio_summary;
      document.getElementById('sum-units').textContent = ps.total_units;
      document.getElementById('sum-value').textContent = ps.total_contract_value;
      document.getElementById('sum-projects').textContent = ps.active_projects;

      // Build cards
      var container = document.getElementById('cards-container');
      var projectOrder = ['aster', 'renza', 'hawk_ridge'];

      projectOrder.forEach(function(key) {
        var p = d.projects[key];
        var draw = d.draws[key];
        if (!p) return;

        var pctDisplay = (p.pct_complete * 100).toFixed(1) + '%';

        // Calculate months remaining
        var finishDate = new Date(p.finish_date + 'T12:00:00');
        var now = new Date();
        var monthsRemaining = Math.max(0, Math.round((finishDate - now) / (1000 * 60 * 60 * 24 * 30.44)));

        // Estimate completion quarter
        var finishQ = 'Q' + (Math.floor(finishDate.getMonth() / 3) + 1) + ' ' + finishDate.getFullYear();

        // Start quarter
        var startDate = new Date(p.start_date + 'T12:00:00');
        var startQ = 'Q' + (Math.floor(startDate.getMonth() / 3) + 1) + ' ' + startDate.getFullYear();

        // Badge class
        var badgeClass = p.status === 'Under Construction' ? 'badge--yellow' : 'badge--blue';

        // Draw status
        var drawHtml = '';
        if (draw) {
          var statusClass = 'draw-status--draft';
          var statusLabel = draw.status;
          if (draw.days_until < 0 && draw.status !== 'Funded' && draw.status !== 'Payments Released') {
            statusClass = 'draw-status--overdue';
            statusLabel = draw.status + ' (Overdue)';
          } else if (draw.status === 'Submitted') {
            statusClass = 'draw-status--submitted';
          } else if (draw.status === 'Funded' || draw.status === 'Payments Released') {
            statusClass = 'draw-status--funded';
          }
          drawHtml = '<hr class="data-divider"><div class="data-row"><span class="data-row-label">Next Draw</span><span class="draw-status ' + statusClass + '">' + statusLabel + '</span></div>';
        }

        var cardHtml = '' +
          '<div class="card">' +
            '<span class="badge ' + badgeClass + '">' + p.status + '</span>' +
            '<div class="card-header">' +
              '<div class="card-name">' + p.display_name + '</div>' +
              '<div class="card-location">' + p.location + '</div>' +
            '</div>' +
            '<div class="progress-section">' +
              '<div class="progress-label">' +
                '<span class="progress-label-text">Progress</span>' +
                '<span class="progress-pct">' + pctDisplay + '</span>' +
              '</div>' +
              '<div class="progress-bar-track">' +
                '<div class="progress-bar-fill" style="width: ' + pctDisplay + '"></div>' +
              '</div>' +
            '</div>' +
            '<div class="card-data">' +
              '<div class="data-row"><span class="data-row-label">Units</span><span class="data-row-value">' + p.units + '</span></div>' +
              '<hr class="data-divider">' +
              '<div class="data-row"><span class="data-row-label">Contract</span><span class="data-row-value">' + p.contract_value + '</span></div>' +
              '<hr class="data-divider">' +
              '<div class="data-row"><span class="data-row-label">Lender</span><span class="data-row-value">' + p.lender + '</span></div>' +
              '<hr class="data-divider">' +
              '<div class="data-row"><span class="data-row-label">Est. Completion</span><span class="data-row-value">' + finishQ + '</span></div>' +
              '<hr class="data-divider">' +
              '<div class="data-row"><span class="data-row-label">GC</span><span class="data-row-value">' + p.gc + '</span></div>' +
              '<hr class="data-divider">' +
              '<div class="data-row"><span class="data-row-label">Start</span><span class="data-row-value">' + startQ + '</span></div>' +
              '<hr class="data-divider">' +
              '<div class="data-row"><span class="data-row-label">Months Remaining</span><span class="data-row-value">~' + monthsRemaining + '</span></div>' +
              drawHtml +
            '</div>' +
            '<div class="milestone">' +
              '<div class="milestone-label">Key Milestone</div>' +
              '<div class="milestone-text">' + p.key_milestone + '</div>' +
            '</div>' +
          '</div>';

        container.insertAdjacentHTML('beforeend', cardHtml);
      });
    })();
  </script>
</body>
</html>
