<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <meta http-equiv="refresh" content="3600">
  <title>Stabilization Runway — Ridgehouse Companies</title>
  <link rel="stylesheet" href="style.css">
  <script src="data/leasing-data.js"></script>
</head>
<body>
  <div class="dashboard" id="dashboard">

    <!-- HEADER -->
    <header class="header">
      <div class="header-left">
        <svg class="header-logo" viewBox="0 0 510 435">
          <path d="M310,181.5V110L110,180V325H400V150ZM120,315V187.09l180-63V185L200,220v95Zm90,0V227.09l90-31.5V315Zm180,0H310V192.09l80-28Z" fill="white"/>
        </svg>
        <div>
          <div class="header-title">RIDGEHOUSE COMPANIES</div>
          <div class="header-subtitle">Stabilization Runway</div>
        </div>
      </div>
      <div class="header-date">
        <div class="date-label">Week Ending</div>
        <div id="report-date">—</div>
      </div>
    </header>

    <!-- PORTFOLIO SUMMARY -->
    <section class="sr-summary">
      <div class="sr-summary-item">
        <div class="sr-summary-label">Total Gap to 90%</div>
        <div class="sr-summary-value sr-text-red" id="total-gap">—</div>
        <div class="sr-summary-detail">units across 4 properties</div>
      </div>
      <div class="sr-summary-item">
        <div class="sr-summary-label">Properties On Track</div>
        <div class="sr-summary-value sr-text-green" id="on-track-count">—</div>
        <div class="sr-summary-detail" id="on-track-detail"></div>
      </div>
      <div class="sr-summary-item">
        <div class="sr-summary-label">Properties Behind</div>
        <div class="sr-summary-value sr-text-red" id="behind-count">—</div>
        <div class="sr-summary-detail" id="behind-detail"></div>
      </div>
      <div class="sr-summary-item">
        <div class="sr-summary-label">Worst Performer</div>
        <div class="sr-summary-value sr-text-red" id="worst-performer">—</div>
        <div class="sr-summary-detail" id="worst-detail"></div>
      </div>
    </section>

    <!-- RUNWAY CARDS -->
    <section class="sr-runways" id="runway-cards">
      <!-- Populated by JS -->
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <span class="footer-brand">RIDGEHOUSE COMPANIES</span>
      <span id="footer-date">—</span>
    </footer>

  </div>

  <style>
    .dashboard {
      padding: 36px 48px 24px;
      gap: 20px;
    }

    /* SUMMARY ROW */
    .sr-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      flex-shrink: 0;
    }

    .sr-summary-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 4px;
    }

    .sr-summary-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .sr-summary-value {
      font-family: var(--font-headline);
      font-size: 44px;
      font-weight: 700;
      line-height: 1.1;
    }

    .sr-summary-detail {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .sr-text-red { color: var(--red); }
    .sr-text-yellow { color: var(--yellow); }
    .sr-text-green { color: var(--green); }
    .sr-text-copper { color: var(--copper-light); }

    /* RUNWAY CARDS */
    .sr-runways {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      flex: 1;
      min-height: 0;
    }

    .sr-runway {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .sr-runway-status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }

    .sr-runway-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .sr-runway-name {
      font-family: var(--font-headline);
      font-size: 20px;
      font-weight: 700;
      color: var(--copper-light);
    }

    .sr-runway-location {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .sr-runway-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .sr-badge-ahead { background: rgba(74,222,128,0.12); color: var(--green); }
    .sr-badge-behind { background: rgba(248,113,113,0.12); color: var(--red); }
    .sr-badge-close { background: rgba(250,204,21,0.12); color: var(--yellow); }

    /* TIMELINE BAR */
    .sr-timeline {
      position: relative;
      height: 48px;
      margin: 8px 0;
    }

    .sr-timeline-track {
      position: absolute;
      top: 18px;
      left: 0;
      right: 0;
      height: 12px;
      background: #2a2a2a;
      border-radius: 6px;
      overflow: hidden;
    }

    .sr-timeline-elapsed {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    .sr-timeline-today {
      position: absolute;
      top: 8px;
      width: 3px;
      height: 32px;
      background: white;
      border-radius: 2px;
      z-index: 2;
    }

    .sr-timeline-today::after {
      content: 'TODAY';
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      color: white;
      white-space: nowrap;
    }

    .sr-timeline-goal {
      position: absolute;
      top: 10px;
      width: 2px;
      height: 28px;
      background: var(--text-muted);
      border-radius: 1px;
      z-index: 1;
    }

    .sr-timeline-goal::after {
      content: attr(data-label);
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .sr-timeline-projected {
      position: absolute;
      top: 10px;
      width: 2px;
      height: 28px;
      border-radius: 1px;
      z-index: 1;
    }

    .sr-timeline-projected::after {
      content: attr(data-label);
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      white-space: nowrap;
    }

    /* DATE COMPARISON */
    .sr-dates {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .sr-date-item {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 12px 14px;
      text-align: center;
    }

    .sr-date-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .sr-date-value {
      font-family: var(--font-headline);
      font-size: 20px;
      font-weight: 700;
    }

    /* VELOCITY METRICS */
    .sr-velocity {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .sr-velocity-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sr-velocity-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .sr-velocity-value {
      font-family: var(--font-headline);
      font-size: 22px;
      font-weight: 700;
    }

    .sr-velocity-unit {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* GAP BANNER */
    .sr-gap-banner {
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .sr-gap-banner-red {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.15);
    }

    .sr-gap-banner-green {
      background: rgba(74,222,128,0.08);
      border: 1px solid rgba(74,222,128,0.15);
    }

    .sr-gap-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .sr-gap-value {
      font-family: var(--font-headline);
      font-size: 28px;
      font-weight: 700;
    }
  </style>

  <script>
    (function() {
      const d = window.LEASING_DATA;
      if (!d) return;

      const pm = d.portfolio_metrics;
      const props = d.property_metrics;
      const today = new Date(d.report_date + 'T12:00:00');

      // Format date
      const dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      document.getElementById('report-date').textContent = dateStr;
      document.getElementById('footer-date').textContent = 'Data as of ' + today.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

      // Summary metrics
      document.getElementById('total-gap').textContent = pm.total_gap_to_goal;

      let onTrack = 0;
      let behind = 0;
      const onTrackNames = [];
      const behindNames = [];

      const order = ['coda', 'norwood', 'somerset', 'avery'];
      order.forEach(key => {
        const p = props[key];
        if (!p) return;
        const projDate = new Date(p.projected_stabilization_date + 'T12:00:00');
        const goalDate = new Date(p.stabilization_goal_date + 'T12:00:00');
        if (projDate <= goalDate) {
          onTrack++;
          onTrackNames.push(p.display_name);
        } else {
          behind++;
          behindNames.push(p.display_name);
        }
      });

      document.getElementById('on-track-count').textContent = onTrack;
      document.getElementById('on-track-detail').textContent = onTrackNames.join(', ') || '—';
      document.getElementById('behind-count').textContent = behind;
      document.getElementById('behind-detail').textContent = behindNames.join(', ') || '—';

      const worst = props[pm.worst_performer];
      document.getElementById('worst-performer').textContent = worst ? worst.display_name : '—';
      document.getElementById('worst-detail').textContent = worst ? worst.gap_to_90_occ_units + ' units to 90%' : '';

      // Runway cards
      const container = document.getElementById('runway-cards');

      // Reference start date for timeline (roughly start of lease-up)
      const timelineStart = new Date('2025-09-01T12:00:00');
      const timelineEnd = new Date('2026-12-01T12:00:00');
      const totalSpan = timelineEnd - timelineStart;

      order.forEach(key => {
        const p = props[key];
        if (!p) return;

        const goalDate = new Date(p.stabilization_goal_date + 'T12:00:00');
        const projDate = new Date(p.projected_stabilization_date + 'T12:00:00');
        const isAhead = projDate <= goalDate;
        const diffDays = Math.round((projDate - goalDate) / (1000 * 60 * 60 * 24));

        // Timeline positions (as percentages)
        const todayPct = Math.min(Math.max(((today - timelineStart) / totalSpan) * 100, 0), 100);
        const goalPct = Math.min(Math.max(((goalDate - timelineStart) / totalSpan) * 100, 0), 100);
        const projPct = Math.min(Math.max(((projDate - timelineStart) / totalSpan) * 100, 0), 100);

        const statusColor = isAhead ? 'green' : (Math.abs(diffDays) <= 30 ? 'yellow' : 'red');
        const badgeClass = isAhead ? 'sr-badge-ahead' : (Math.abs(diffDays) <= 30 ? 'sr-badge-close' : 'sr-badge-behind');
        const badgeText = isAhead ? 'AHEAD' : (Math.abs(diffDays) <= 30 ? 'AT RISK' : 'BEHIND');

        const goalStr = goalDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const projStr = projDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

        const velocityColor = p.trailing_4wk_move_in_velocity >= p.req_weekly_move_in_velocity ? 'var(--green)' : 'var(--red)';

        const card = document.createElement('div');
        card.className = 'sr-runway';
        card.innerHTML = `
          <div class="sr-runway-status-bar" style="background: var(--${statusColor})"></div>
          <div class="sr-runway-header">
            <div>
              <div class="sr-runway-name">${p.display_name}</div>
              <div class="sr-runway-location">${p.city}</div>
            </div>
            <span class="sr-runway-badge ${badgeClass}">${badgeText}</span>
          </div>

          <div class="sr-timeline">
            <div class="sr-timeline-track">
              <div class="sr-timeline-elapsed" style="width: ${todayPct}%; background: var(--${statusColor})"></div>
            </div>
            <div class="sr-timeline-today" style="left: ${todayPct}%"></div>
            <div class="sr-timeline-goal" style="left: ${goalPct}%" data-label="Goal: ${goalStr}"></div>
            <div class="sr-timeline-projected" style="left: ${projPct}%; background: var(--${statusColor}); color: var(--${statusColor})" data-label="Proj: ${projStr}"></div>
          </div>

          <div class="sr-dates">
            <div class="sr-date-item">
              <div class="sr-date-label">Goal Date</div>
              <div class="sr-date-value" style="color: var(--text-secondary)">${goalStr}</div>
            </div>
            <div class="sr-date-item">
              <div class="sr-date-label">Projected</div>
              <div class="sr-date-value" style="color: var(--${statusColor})">${projStr}</div>
            </div>
          </div>

          <div class="sr-velocity">
            <div class="sr-velocity-item">
              <div class="sr-velocity-label">Required Velocity</div>
              <div class="sr-velocity-value" style="color: var(--text-secondary)">${p.req_weekly_move_in_velocity.toFixed(1)}</div>
              <div class="sr-velocity-unit">move-ins / week</div>
            </div>
            <div class="sr-velocity-item">
              <div class="sr-velocity-label">Actual (4-wk avg)</div>
              <div class="sr-velocity-value" style="color: ${velocityColor}">${p.trailing_4wk_move_in_velocity.toFixed(1)}</div>
              <div class="sr-velocity-unit">move-ins / week</div>
            </div>
          </div>

          <div class="sr-velocity">
            <div class="sr-velocity-item">
              <div class="sr-velocity-label">Move-Ins Needed</div>
              <div class="sr-velocity-value" style="color: var(--text-primary)">${p.move_ins_needed}</div>
              <div class="sr-velocity-unit">to reach 90% occ</div>
            </div>
            <div class="sr-velocity-item">
              <div class="sr-velocity-label">30-Day Net Exposure</div>
              <div class="sr-velocity-value" style="color: ${p.net_exposure_next_30 != null ? (p.net_exposure_next_30 >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--text-muted)'}">${p.net_exposure_next_30 != null ? (p.net_exposure_next_30 >= 0 ? '+' + p.net_exposure_next_30 : p.net_exposure_next_30) : '—'}</div>
              <div class="sr-velocity-unit">move-ins minus move-outs</div>
            </div>
          </div>

          <div class="sr-gap-banner ${isAhead ? 'sr-gap-banner-green' : 'sr-gap-banner-red'}">
            <span class="sr-gap-label">Units to 90%</span>
            <span class="sr-gap-value" style="color: var(--${statusColor})">${p.gap_to_90_occ_units}</span>
          </div>
        `;
        container.appendChild(card);
      });
    })();
  </script>
</body>
</html>
